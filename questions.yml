# Third date questions - going deeper
# Sources: PureWow, QuestionsAboutEverything, ForgettingFairytales, Sergovantseva

# Relationship & Dating
- What are you looking for at this stage of your life?
- What's the biggest thing you've learned about relationships?
- When it comes to a long-term relationship, what are your must-haves?
- What are dealbreakers for you in a relationship?
- How do you typically handle conflict with someone you care about?
- What's your love language?
- How do you like to show appreciation in a relationship?
- How do you want a partner to show they appreciate you?
- What does quality time mean to you?
- Have you ever been in love, and what did it teach you?
- What's your relationship history like?
- How long have you been single?
- Do you feel like you've fully healed from your last relationship?
- What would you do differently in your last relationship?
- What's the hardest lesson you've learned in your love life?
- What's been the biggest turning point in your dating life?
- How do you find dating these days?
- What are the best and worst things about dating?
- Are you still on dating apps or seeing other people?
- Where do you see things heading between us?
- What's surprised you most about me since we met?
- What was your favorite part about our previous dates?
- How important is intimacy to a healthy relationship?
- Do you like public displays of affection?
- What are your biggest fears about being in a relationship?
- What small actions from a partner make you feel seen and valued?
- How do you balance personal space with closeness?

# Values & Beliefs
- What are your core values?
- Does religion or spirituality play a role in your life?
- What do you feel strongly about in the world?
- Do you believe in karma?
- What do you think happens when we die?
- Do you believe people who cheat deserve second chances?
- What's a value you'd never compromise on?
- How important is honesty, even when the conversation is difficult?
- What causes or charities matter most to you?

# Family & Background
- How close are you with your family?
- Do you have a good relationship with your parents?
- What have you learned about love from your parents' relationship?
- Do you think your parents' relationship was a good model for you?
- What would you do differently than your parents if you raised a child?
- Do you want kids someday?
- Do you want to get married at some point?
- What does your ideal family life look like?
- Who's the most special person in your life?
- Who do you most look up to?

# Life & Lifestyle
- What does a really good weekend look like for you?
- What does a typical day look like for you?
- How much free time do you tend to have?
- Are you someone who likes to travel a lot?
- Would you prefer to live in a city or the countryside?
- Do you enjoy spending time alone?
- How do you recharge after a long week?
- Are you a morning person or a night owl?
- Do you consider yourself introverted or extroverted?
- What's your relationship with your phone and technology?
- Do you like pets? Dogs or cats?
- How do you feel about pets sleeping on the bed?
- Are you a good cook? What's your signature dish?
- What do you spend most of your money on?
- Are you good with your finances?
- Would you ever want to own your own business?

# Dreams & Ambitions
- Where do you see yourself in five years?
- What personal growth do you want to achieve in the coming years?
- What are you most ambitious about?
- What's on your bucket list?
- If you could be anywhere in the world right now, where would you be?
- What's your dream vacation?
- Is there anything you've always wanted to try but haven't yet?
- What would you do if money were no object?
- If you had two weeks to live, how would you spend them?

# Self-Reflection & Growth
- What's something you've changed your mind about in recent years?
- What's something you're genuinely proud of that you don't talk about much?
- How would your closest friends describe you?
- Do you think the image you have of yourself matches how others see you?
- What's the hardest lesson you've had to learn in life?
- What's a mistake you made that taught you a lot?
- What are you still working on about yourself?
- How do you handle stress?
- When do you feel most like yourself?
- What keeps you awake at night?
- What worries you most in life?
- Have you ever struggled with your mental health?
- When you have a problem, who do you talk to?
- Do you find it easy to talk about your feelings?
- What's one thing most people don't know about you?

# Past & Memories
- What were you like as a kid?
- What's your earliest happy memory?
- What trip has impacted you the most?
- What relationship or friendship has shaped you the most?
- What's the most fun you've ever had?
- What's the most unexpected thing that's ever happened to you?
- What was your favorite book or movie growing up?
- Is there anything you'd change about your childhood?
- When and where do you feel most like yourself?
- What's the best piece of advice you've ever received?
- What's the nicest thing you've done for someone you care about?
- What's the best compliment anyone's ever given you?
- Is there anyone who changed your life but doesn't know it?

# Fun & Quirky
- What's your guiltiest pleasure?
- What's a pleasure you're not guilty about at all?
- What always makes you laugh?
- Do you like dancing?
- What's your favorite way to spend a lazy Sunday?
- Would you rather plan everything or be spontaneous?
- Do you celebrate anniversaries?
- What's the most embarrassing thing that's happened to you on a date?
- Have you ever been catfished?
- Have you ever walked out on a date?
- What social situations make you feel most awkward?
- What tiny joys do you try to preserve even during tough times?
- What's your favorite season and why?
- Coffee or tea?
- What's your go-to drink?

# Getting Deeper
- What should I know about you that I'd never think to ask?
- What do you think makes a relationship actually work long-term?
- How do you know when you can trust someone?
- What does it take for you to be vulnerable with someone?
- How do you like to be supported when you're going through a hard time?
- What does home feel like to you?
- What traditions would you want to keep or start with a partner?
- What does a healthy partnership look like in daily life?
- What makes you feel safe in a relationship?
- Do you believe people come into your life for a reason?
